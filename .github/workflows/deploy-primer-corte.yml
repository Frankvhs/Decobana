name: Primer corte evaluativo

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Número de versión (ej. 1.0.0)'
        required: true
        type: string

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar draw.io-export
        run: npm install -g draw.io-export

      - name: Generar PNG desde archivo Draw.io
        run: |
          mkdir -p output
          drawio docs/DIAGRAMA.drawio -o output/diagrama.png -F png 

      - name: Copiar migración SQL
        run: cp db/migrations/20260420142936_initial_db.sql output/generacion.sql

      - name: Crear ZIP con versión
        run: |
          cd output
          zip -r ../primer-corte-${{ inputs.version }}.zip .

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: primer-corte-v${{ inputs.version }}
          name: Primer Corte Evaluativo v${{ inputs.version }}
          files: primer-corte-${{ inputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
